name: 🧪 Lint
on:
  push:
    branches-ignore: [wip/**]
jobs:
  lint:
    name: 🔎 Lint Playground
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with: { check-latest: true }
      - name: Setup TinyGo
        uses: acifani/setup-tinygo@v2
        with: { tinygo-version: 0.40.1 }
      - name: Install Dependencies
        run: make debian-lint-depends
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
